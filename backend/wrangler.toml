name = "langgraph-chatbot-backend"
main = "cf_entry.py"
compatibility_date = "2025-12-01"
compatibility_flags = ["python_workers"]
find_additional_modules = false

[vars]
LOG_LEVEL = "info"
LLM_PROVIDER = "anthropic"
VECTORSTORE_PROVIDER = "vectorize"
EMBEDDINGS_PROVIDER = "workers-ai"

[[vectorize]]
binding = "VECTORIZE"
index_name = "langgraph-chatbot"

[python_modules]
excludes = ["**/*.pyc", "**/__pycache__", "**/*.pyi"]
