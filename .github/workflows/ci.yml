name: CI

on:
  push:
  pull_request:

# Cancel in-flight runs of the same workflow on the same ref when a new
# push arrives. Stops a pile of CI runs accumulating on a rapid-edit
# branch and avoids paying for work the next commit will supersede.
# github.workflow + github.ref are GitHub-controlled context, not user
# input, so this group expression is safe.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend -- lint + unit tests + type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: backend

      - name: Lint (ruff)
        run: uv run ruff check . && uv run ruff format --check .
        working-directory: backend

      - name: Unit tests
        run: uv run pytest tests/unit -v --tb=short
        working-directory: backend

      - name: Type check (mypy)
        run: uv run mypy app --ignore-missing-imports
        working-directory: backend

  frontend:
    name: Frontend -- type check + build + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check (tsc)
        # Run before the test/build steps so a type regression fails fast
        # with a clearer error than waiting for vite-plugin-react to surface
        # it during the production bundle.
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Test
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
