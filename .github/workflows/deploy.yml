name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy frontend to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@f0a1cd58cd66095dee69bfa18fa5efd1dde93bca # v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: langgraph-chatbot
          directory: frontend/dist

  deploy-backend:
    name: Deploy backend to Cloudflare Workers (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Prepare clean deploy workspace
        # Copy only the app source and wrangler config into a fresh directory.
        # This prevents pywrangler from walking .venv, tests/, or other dev
        # artefacts that would push the bundle over CF's 10 MiB limit.
        run: |
          mkdir -p /tmp/cf-deploy
          cp -r backend/app /tmp/cf-deploy/app
          cp backend/cf_entry.py /tmp/cf-deploy/cf_entry.py
          cp backend/wrangler.toml /tmp/cf-deploy/wrangler.toml
          cat > /tmp/cf-deploy/pyproject.toml << 'TOML'
          [project]
          name = "langgraph-chatbot-backend"
          version = "0.1.0"
          requires-python = ">=3.12"
          dependencies = [
              "anthropic>=0.40.0",
              "fastapi>=0.115.0",
              "langgraph>=0.2.50",
              "pydantic>=2.10.0",
              "httpx>=0.28.0",
              "python-multipart>=0.0.20",
              "aiofiles>=24.1.0",
          ]

          [dependency-groups]
          dev = [
              "workers-py",
              "workers-runtime-sdk",
          ]
          TOML

      - name: Deploy via pywrangler
        working-directory: /tmp/cf-deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: uv run pywrangler deploy

      - name: Set Worker secrets
        working-directory: /tmp/cf-deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | uv run pywrangler secret put ANTHROPIC_API_KEY
          echo "${{ secrets.NOTION_TOKEN }}" | uv run pywrangler secret put NOTION_TOKEN
          echo "${{ secrets.NOTION_DATABASE_ID }}" | uv run pywrangler secret put NOTION_DATABASE_ID
          echo "${{ secrets.WORKLOG_WORKER_URL }}" | uv run pywrangler secret put WORKLOG_WORKER_URL
          echo "${{ secrets.WORKLOG_API_KEY }}" | uv run pywrangler secret put WORKLOG_API_KEY
          echo "${{ secrets.LANGGRAPH_WEBHOOK_SECRET }}" | uv run pywrangler secret put LANGGRAPH_WEBHOOK_SECRET
