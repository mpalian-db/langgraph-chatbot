[router]
enabled = true
model = "llama3.2:3b"
# Anthropic alternative: model = "claude-haiku-4-5-20251001"
prompt = """You are a routing agent. Given the user's message, classify it into one of these routes:
- "chat": general conversation, greetings, meta questions about the system
- "rag": questions that likely require searching indexed knowledge
- "tool": requests to inspect collections, upload documents, or run system operations
- "worklog": questions about worklogs, logged hours, time tracking, or worklog plans

Respond with ONLY the route name: chat, rag, tool, or worklog."""
routes = ["chat", "rag", "tool", "worklog"]

[chat_agent]
enabled = true
model = "llama3.2:3b"
# Anthropic alternative: model = "claude-haiku-4-5-20251001"
system_prompt = "You are a helpful assistant. Answer the user's questions clearly and concisely."
max_tokens = 2048

[retrieval]
enabled = true
top_k = 10
# Aligned with verifier.score_threshold below: if a chunk is good enough to
# retrieve, it is good enough to ground an answer. This eliminates the dead
# band where chunks would pass retrieval only to be refused by the verifier
# after wasting an answer-generation LLM call. The verifier's score_threshold
# check remains as defence-in-depth.
score_threshold = 0.55
rerank = true
default_collection = "langgraph-docs"

[answer_generation]
enabled = true
model = "llama3.1:8b"
# Anthropic alternative: model = "claude-sonnet-4-6-20250514"
prompt_template = """Answer the user's question using ONLY the evidence below. Include inline citations using chunk IDs like [chunk-id].

Evidence:
{evidence}

Question: {query}

If the evidence does not support a complete answer, say what you can support and indicate what is missing."""
max_tokens = 2048

[verifier]
enabled = true
# Default uses the system LLM (Ollama for local dev). To enable LLM-based
# support_analysis with reliable structured output, override here:
#   provider = "anthropic"
#   model = "claude-haiku-4-5-20251001"
# That requires ANTHROPIC_API_KEY in the environment. The graph is built
# per-request inside the chat route, so a missing key surfaces as a 500 on
# the first chat, with the message "agent config requests LLM provider
# 'anthropic' but it is not registered" in the response body. (A future
# improvement is to validate the registry against the loaded config at
# application startup so misconfiguration fails before the first request.)
model = "llama3.1:8b"
score_threshold = 0.55
# Tuned to 0.5 so answers pass when most non-trivial sentences cite, without
# every "explaining" answer being refused. Bump to 0.8 for stricter grounding
# once a more capable model is wired for support_analysis.
citation_coverage_min = 0.5
max_retries = 2
# score_threshold + citation_coverage are deterministic. support_analysis is
# LLM-based; keep it disabled while the verifier runs on Ollama (unreliable
# structured output) and re-enable it together with the Anthropic override
# above for production-grade grounding.
checks = ["score_threshold", "citation_coverage"]

[tool_agent]
enabled = true
model = "llama3.1:8b"
# Anthropic alternative: model = "claude-haiku-4-5-20251001"
system_prompt = """You are a tool-using assistant for a RAG knowledge base system. You have tools to inspect and manage vector collections. Use the available tools to answer the user's request. Always call the appropriate tool first, then report exactly what the tool returned. Never guess or make up results -- only report what the tools actually return."""
allowed_tools = [
    "search_collection",
    "list_collections",
    "get_collection_stats",
    "rebuild_index",
    "upload_document",
    "delete_document",
]
max_tool_calls = 5

[worklog_agent]
enabled = true
model = "llama3.2:3b"
# Anthropic alternative: model = "claude-haiku-4-5-20251001"
system_prompt = """You are a worklog assistant. You help the user understand their logged hours and worklog plans.
You can list existing plans, show plan details, and generate new plans.
You CANNOT apply plans or modify Jira/Tempo data -- only read and generate.
Present information clearly and concisely."""
max_tokens = 2048
