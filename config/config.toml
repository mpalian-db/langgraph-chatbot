[environment]
mode = "local"
log_level = "debug"

[llm]
provider = "ollama"                     # "ollama" (default) or "anthropic"
ollama_base_url = "http://localhost:11434"

[tracing]
langfuse_enabled = true
langfuse_host = "http://localhost:3000" # self-hosted; or "https://cloud.langfuse.com"
langfuse_project = "langgraph-chatbot"

[vectorstore]
provider = "qdrant"                   # "qdrant" (default) or "vectorize" (Cloudflare)
qdrant_url = "http://localhost:6333"
# vectorize settings (uncomment for Cloudflare deployment):
# vectorize_index_name = "langgraph-chatbot"
# known_collections = ["langgraph-docs", "notion-docs", "edgenotes"]
# CF_ACCOUNT_ID and CF_API_TOKEN must be set as environment variables.

[embeddings]
provider = "ollama"                     # "ollama" (default) or "workers-ai"
ollama_model = "nomic-embed-text"       # 768-dimension embeddings
ollama_base_url = "http://localhost:11434"
# workers-ai settings (uncomment for Cloudflare deployment):
# workers_ai_model = "@cf/baai/bge-small-en-v1.5"
# workers_ai_base_url = "https://api.cloudflare.com/client/v4/accounts"

[ingestion]
chunk_size = 512
chunk_overlap = 64
supported_formats = ["md", "txt", "pdf"]

[worklog]
# Worker URL and API key are read from environment variables
# WORKLOG_WORKER_URL and WORKLOG_API_KEY at runtime.

[notion]
default_collection = "notion-docs"
# Notion API token and database ID are read from environment variables
# NOTION_TOKEN and NOTION_DATABASE_ID at runtime -- not stored in config.

[webhooks]
edgenotes_secret = ""              # set to match LANGGRAPH_WEBHOOK_SECRET in EdgeNotes
edgenotes_collection = "edgenotes" # Qdrant collection for note chunks
